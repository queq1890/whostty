name: CI

# Build/test CI. This is separate from upstream tracking (which uses a Claude
# Routine, not Actions — see docs/release-routine.md); it only compiles the
# project and runs the host unit tests.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install the pinned Zig straight from the canonical release path. The
      # setup-zig action resolves versions via a mirror index that didn't carry
      # this version, so fetch the tarball directly. Zig changed its archive
      # naming to `zig-<arch>-<os>` in the 0.15 series, so try the new naming
      # first and fall back to the old `zig-<os>-<arch>` form.
      - name: Install Zig
        run: |
          version="$(cat .zigversion)"
          base="https://ziglang.org/download/${version}"
          ok=""
          for name in "zig-x86_64-linux-${version}" "zig-linux-x86_64-${version}"; do
            url="${base}/${name}.tar.xz"
            echo "Trying $url"
            if curl -fsSL "$url" -o zig.tar.xz; then ok=1; break; fi
          done
          if [ -z "$ok" ]; then echo "could not download Zig ${version}"; exit 1; fi
          mkdir -p "$HOME/zig"
          tar -xJf zig.tar.xz -C "$HOME/zig" --strip-components=1
          echo "$HOME/zig" >> "$GITHUB_PATH"

      - name: Zig version
        run: zig version

      - name: Host unit tests
        run: zig build test

      - name: Cross-compile the Win32 terminal (link check)
        run: zig build -Dtarget=x86_64-windows

      # Shaping (#79) rides on Freetype + HarfBuzz (both built from source). This
      # cross-compiles the full shaped renderer for Windows — link-checking the
      # HarfBuzz binding, the shaper, and the apprt's shaped-text path — and then
      # builds + runs the standalone shaping proof (which links HarfBuzz only and
      # shapes via the OpenType blob path, no Freetype).
      - name: Cross-compile the shaped Win32 terminal (Freetype + HarfBuzz)
        run: zig build -Dtarget=x86_64-windows -Dfreetype -Dharfbuzz

      - name: HarfBuzz shaping proof
        run: zig build shape-proof
