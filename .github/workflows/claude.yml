name: Claude

# Lets you mention @claude in an issue, an issue/PR comment, or a PR review to
# have Claude analyze the repo, answer, implement changes, or open a PR.
#
# Setup (one-time, by a repo admin):
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#   2. Authenticate with your Claude Pro/Max subscription:
#        - run `claude setup-token` locally (Pro/Max) to generate an OAuth token
#        - add it as a `CLAUDE_CODE_OAUTH_TOKEN` repository secret
#      (Settings → Secrets and variables → Actions).
#      To bill the pay-as-you-go API instead, swap in an `ANTHROPIC_API_KEY`
#      secret and use `anthropic_api_key:` below.
# Docs: https://code.claude.com/docs/github-actions

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when a human actually mentions @claude, to avoid wasting runner
    # minutes and API tokens on every comment.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write # exchanged for the Claude GitHub App token (PR/commit writes)
      actions: read # let Claude read CI results on the PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # Uses a Claude Pro/Max subscription (no API billing). Generate the
          # token with `claude setup-token` and store it as this secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
